name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'npm version argument, for example patch, minor, major, or 1.0.0'
        required: true
        default: patch
      publish:
        description: 'Publish to npm after validation'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and Release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Manual releases must run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run build-storybook
      - run: npm run size

      - name: Configure git author
        if: inputs.publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version package
        if: inputs.publish
        run: npm version "${{ inputs.version }}" -m "Release v%s"

      - name: Rebuild release artifact
        if: inputs.publish
        run: npm run build

      - name: Publish to npm
        if: inputs.publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        if: inputs.publish
        run: git push --follow-tags
